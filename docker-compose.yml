services:
  postgres:
    image: postgres:16-alpine
    container_name: brawl_postgres
    environment:
      POSTGRES_USER: brawl
      POSTGRES_PASSWORD: brawl
      POSTGRES_DB: brawl_draft
    ports:
      - "5432:5432"
    volumes:
      - brawl_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brawl -d brawl_draft"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: brawl_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    container_name: brawl_backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg://brawl:brawl@postgres:5432/brawl_draft
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  brawl_pg_data:
